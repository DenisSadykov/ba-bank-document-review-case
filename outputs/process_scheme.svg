<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2320" viewBox="0 0 1600 2320">
  <defs>
    <style>
      .title { font: 700 40px Arial, sans-serif; fill: #16324f; }
      .label { font: 600 24px Arial, sans-serif; fill: #16324f; }
      .text { font: 500 22px Arial, sans-serif; fill: #1f2d3d; }
      .small { font: 500 20px Arial, sans-serif; fill: #1f2d3d; }
      .box { fill: #f7fbff; stroke: #2f80ed; stroke-width: 3; rx: 22; }
      .decision { fill: #fffaf2; stroke: #f2994a; stroke-width: 3; }
      .danger { fill: #fff4f4; stroke: #eb5757; stroke-width: 3; rx: 22; }
      .warn { fill: #fff9eb; stroke: #f2c94c; stroke-width: 3; rx: 22; }
      .success { fill: #f1fbf4; stroke: #27ae60; stroke-width: 3; rx: 22; }
      .arrow { stroke: #4a5568; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .branch { stroke: #7a8797; stroke-width: 3; fill: none; marker-end: url(#arrowheadSmall); }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#4a5568"/>
    </marker>
    <marker id="arrowheadSmall" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7a8797"/>
    </marker>
  </defs>

  <rect width="1600" height="2320" fill="#ffffff"/>
  <text x="800" y="80" text-anchor="middle" class="title">Процесс первичной проверки пакета документов</text>
  <text x="800" y="125" text-anchor="middle" class="label">Перед заявлением авансового платежа в банк</text>

  <rect x="610" y="170" width="380" height="90" rx="45" class="box"/>
  <text x="800" y="225" text-anchor="middle" class="label">Старт</text>

  <line x1="800" y1="260" x2="800" y2="330" class="arrow"/>

  <rect x="450" y="330" width="700" height="120" class="box"/>
  <text x="800" y="385" text-anchor="middle" class="label">Специалист загружает пакет документов</text>
  <text x="800" y="418" text-anchor="middle" class="text">договор, спецификация, счет, УПД/акт, правила программы</text>

  <line x1="800" y1="450" x2="800" y2="520" class="arrow"/>

  <rect x="520" y="520" width="560" height="110" class="box"/>
  <text x="800" y="580" text-anchor="middle" class="label">Выбор льготной программы</text>
  <text x="800" y="612" text-anchor="middle" class="text">федеральная / областная</text>

  <line x1="800" y1="630" x2="800" y2="700" class="arrow"/>

  <rect x="430" y="700" width="740" height="130" class="box"/>
  <text x="800" y="760" text-anchor="middle" class="label">AI-агент извлекает данные из документов</text>
  <text x="800" y="795" text-anchor="middle" class="text">контрагент, сумма, даты, предмет оплаты, номенклатура, количество,</text>
  <text x="800" y="823" text-anchor="middle" class="text">сроки, ссылки на приложения, признаки подписи и печати</text>

  <line x1="800" y1="830" x2="800" y2="900" class="arrow"/>

  <rect x="500" y="900" width="600" height="110" class="box"/>
  <text x="800" y="960" text-anchor="middle" class="label">Проверка комплектности пакета</text>
  <text x="800" y="992" text-anchor="middle" class="text">все ли обязательные документы приложены</text>

  <line x1="800" y1="1010" x2="800" y2="1060" class="arrow"/>

  <polygon points="800,1060 1030,1170 800,1280 570,1170" class="decision"/>
  <text x="800" y="1155" text-anchor="middle" class="label">Есть обязательный документ,</text>
  <text x="800" y="1188" text-anchor="middle" class="label">которого не хватает?</text>

  <line x1="570" y1="1170" x2="270" y2="1170" class="branch"/>
  <text x="410" y="1145" text-anchor="middle" class="small">Да</text>
  <line x1="270" y1="1170" x2="270" y2="1280" class="branch"/>
  <rect x="80" y="1280" width="380" height="110" class="danger"/>
  <text x="270" y="1340" text-anchor="middle" class="label">Статус: Нельзя заявлять</text>
  <text x="270" y="1372" text-anchor="middle" class="text">Причина: неполный комплект</text>

  <line x1="1030" y1="1170" x2="1260" y2="1170" class="branch"/>
  <text x="1145" y="1145" text-anchor="middle" class="small">Нет</text>
  <line x1="1260" y1="1170" x2="1260" y2="1450" class="branch"/>
  <line x1="1260" y1="1450" x2="800" y2="1450" class="branch"/>

  <line x1="800" y1="1280" x2="800" y2="1450" class="arrow"/>

  <rect x="410" y="1450" width="780" height="130" class="box"/>
  <text x="800" y="1510" text-anchor="middle" class="label">Проверка реквизитов и правил программы</text>
  <text x="800" y="1545" text-anchor="middle" class="text">сроки, соответствие предмета оплаты, обязательные реквизиты,</text>
  <text x="800" y="1573" text-anchor="middle" class="text">связность договора, спецификации и счета, наличие подписи/печати</text>

  <line x1="800" y1="1580" x2="800" y2="1640" class="arrow"/>

  <polygon points="800,1640 1030,1750 800,1860 570,1750" class="decision"/>
  <text x="800" y="1735" text-anchor="middle" class="label">Найден критичный</text>
  <text x="800" y="1768" text-anchor="middle" class="label">стоп-фактор?</text>

  <line x1="570" y1="1750" x2="270" y2="1750" class="branch"/>
  <text x="410" y="1725" text-anchor="middle" class="small">Да</text>
  <line x1="270" y1="1750" x2="270" y2="1860" class="branch"/>
  <rect x="80" y="1860" width="380" height="110" class="danger"/>
  <text x="270" y="1920" text-anchor="middle" class="label">Статус: Нельзя заявлять</text>
  <text x="270" y="1952" text-anchor="middle" class="text">Причина: найдено нарушение</text>

  <line x1="1030" y1="1750" x2="1290" y2="1750" class="branch"/>
  <text x="1180" y="1725" text-anchor="middle" class="small">Нет</text>
  <line x1="1290" y1="1750" x2="1290" y2="1880" class="branch"/>

  <polygon points="1290,1880 1490,1970 1290,2060 1090,1970" class="decision"/>
  <text x="1290" y="1955" text-anchor="middle" class="label">Есть сомнение,</text>
  <text x="1290" y="1986" text-anchor="middle" class="label">низкая уверенность</text>
  <text x="1290" y="2017" text-anchor="middle" class="label">или неполные данные?</text>

  <line x1="1090" y1="1970" x2="540" y2="1970" class="branch"/>
  <text x="815" y="1945" text-anchor="middle" class="small">Нет</text>
  <line x1="540" y1="1970" x2="540" y2="2120" class="branch"/>
  <rect x="230" y="2120" width="620" height="110" class="success"/>
  <text x="540" y="2180" text-anchor="middle" class="label">Статус: Можно заявлять в банк</text>
  <text x="540" y="2212" text-anchor="middle" class="text">Все обязательные проверки пройдены</text>

  <line x1="1490" y1="1970" x2="1540" y2="1970" class="branch"/>
  <text x="1515" y="1945" text-anchor="middle" class="small">Да</text>
  <line x1="1540" y1="1970" x2="1540" y2="2120" class="branch"/>
  <rect x="980" y="2120" width="520" height="110" class="warn"/>
  <text x="1240" y="2180" text-anchor="middle" class="label">Статус: Требуется ручная проверка</text>
  <text x="1240" y="2212" text-anchor="middle" class="text">Кейс передается специалисту / контролеру</text>
</svg>
